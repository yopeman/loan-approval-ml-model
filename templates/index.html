<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.8;
            font-size: 1.1rem;
        }

        .form-container {
            padding: 2.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2d3748;
        }

        .form-group input, .form-group select {
            padding: 0.875rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .result {
            grid-column: 1 / -1;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            margin-top: 1rem;
        }

        .result.approved {
            background: #c6f6d5;
            border: 2px solid #38a169;
            color: #22543d;
        }

        .result.rejected {
            background: #fed7d7;
            border: 2px solid #e53e3e;
            color: #742a2a;
        }

        .result h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            body {
                padding: 1rem;
            }
            
            .form-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 Loan Approval Predictor</h1>
            <p>Machine Learning Model - 98% Accuracy</p>
        </div>
        
        <div class="form-container">
            <form id="loanForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Number of Dependents</label>
                        <input type="number" name="no_of_dependents" min="0" max="10" placeholder="e.g. 2" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Education</label>
                        <select name="education" required>
                            <option value=" Graduate">Graduate</option>
                            <option value=" Not Graduate">Not Graduate</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Self Employed</label>
                        <select name="self_employed" required>
                            <option value=" No">No</option>
                            <option value=" Yes">Yes</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Annual Income</label>
                        <input type="number" name="income_annum" min="0" placeholder="e.g. 9600000" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Loan Amount</label>
                        <input type="number" name="loan_amount" min="0" placeholder="e.g. 29900000" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Loan Term (Years)</label>
                        <input type="number" name="loan_term" min="1" max="30" placeholder="e.g. 12" required>
                    </div>
                    
                    <div class="form-group">
                        <label>CIBIL Score (300-900)</label>
                        <input type="number" name="cibil_score" min="300" max="900" placeholder="e.g. 778" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Residential Assets Value</label>
                        <input type="number" name="residential_assets_value" min="0" placeholder="e.g. 2400000" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Commercial Assets Value</label>
                        <input type="number" name="commercial_assets_value" min="0" placeholder="e.g. 17600000" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Luxury Assets Value</label>
                        <input type="number" name="luxury_assets_value" min="0" placeholder="e.g. 22700000" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Bank Asset Value</label>
                        <input type="number" name="bank_asset_value" min="0" placeholder="e.g. 8000000" required>
                    </div>

                    <button type="submit" class="btn">Predict Loan Approval</button>

                    <div id="result" class="result" style="display: none;">
                        <h3 id="resultText"></h3>
                        <p id="confidenceText"></p>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loanForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('resultText');
            const confidenceText = document.getElementById('confidenceText');
            
            // Show loading state
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultText.textContent = 'Predicting...';
            confidenceText.textContent = '';
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultText.textContent = `Loan Status: ${result.result}`;
                    confidenceText.textContent = `Confidence: ${result.confidence}%`;
                    resultDiv.className = `result ${result.status}`;
                } else {
                    resultText.textContent = `Error: ${result.error}`;
                    resultDiv.className = 'result rejected';
                }
                
            } catch (error) {
                resultText.textContent = `Connection Error: ${error.message}`;
                resultDiv.className = 'result rejected';
            }
        });
    </script>
</body>
</html>
